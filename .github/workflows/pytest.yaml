name: pytest

# yamllint disable-line rule:truthy
on:
  pull_request:
    paths:
      - "custom_components/**"
      - "tests/**"
      - "requirements-test.txt"
      - "pyproject.toml"
      - ".github/workflows/pytest.yaml"
  push:
    # deploy/main are the merge queue destinations — always run there
    # as the last-line safety net, even for docs-only merges.
    branches: [deploy, main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt
      - run: pip install -r requirements-test.txt
      - run: pytest tests/
